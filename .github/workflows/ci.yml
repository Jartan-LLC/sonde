name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Shellcheck
        run: find . -name "*.sh" -not -path "*/.git/*" -not -path "*/node_modules/*" -not -path "*/vendor/*" -print0 | xargs -r -0 shellcheck

      # TODO: Add your lint/format commands
      # Example (Python):
      # - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      #   with:
      #     python-version: "3.12"
      # - run: pip install ruff && ruff check . && ruff format --check .
      #
      # Example (Node):
      # - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      # - run: npm ci && npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # TODO: Add your test commands
      # Example (Python):
      # - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      #   with:
      #     python-version: "3.12"
      # - run: pip install -e '.[dev]' && pytest
      #
      # Example (Node):
      # - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      # - run: npm ci && npm test

  check:
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: |
          results=("${{ needs.lint.result }}" "${{ needs.test.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Check failed: $r"
              exit 1
            fi
          done

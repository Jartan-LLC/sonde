name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### Optional"

  - type: textarea
    id: workaround
    attributes:
      label: Current Workaround
      description: How do you handle this today?

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / Alternatives
      description: Any ideas on how this could work, approaches you've considered, or things you've ruled out. A clear problem statement without a solution is equally valuable.
